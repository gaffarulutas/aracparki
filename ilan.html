<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="İlan detayı — Araç Parkı" />
    <title>İlan Detayı | Araç Parkı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">İçeriğe geç</a>

    <header class="site-header">
      <div class="header-top">
        <div class="container header-top-inner">
          <a class="logo" href="index.html" aria-label="Araç Parkı ana sayfa">
            <span class="logo-arac">Araç</span><span class="logo-parki">Parkı</span>
          </a>
          <form class="header-search" id="search-form" action="ilanlar.html" method="get" role="search">
            <label class="sr-only" for="search-query">Kelime ara</label>
            <input
              id="search-query"
              name="q"
              type="search"
              placeholder="Marka, model veya ilan no"
              autocomplete="off"
              enterkeyhint="search"
            />
            <button class="btn btn-machine" type="submit">Ara</button>
          </form>
          <div class="header-actions">
            <a class="link-quiet" href="index.html#giris">Giriş Yap</a>
            <a class="btn btn-machine" href="index.html#ilan-ver">Ücretsiz İlan Ver</a>
          </div>
        </div>
      </div>
    </header>

    <main class="container page-detail" id="main">
      <div id="detail-root" aria-busy="true">
        <div class="detail-loading" aria-label="İlan yükleniyor">
          <div class="skeleton-gallery" aria-hidden="true"></div>
          <div class="skeleton-stack" aria-hidden="true">
            <div class="skeleton-line w-60"></div>
            <div class="skeleton-line w-40"></div>
            <div class="skeleton-line w-80"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
      </div>
    </main>

    <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom">
          <span>© 2026 Araç Parkı · aracparki.com</span>
          <a href="ilanlar.html">Tüm ilanlar</a>
        </div>
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="detay.js"></script>
  </body>
</html>
