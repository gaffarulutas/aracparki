<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="İş makinesi ilanları — satılık, kiralık ve ikinci el. Araç Parkı." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Araç Parkı" />
    <meta property="og:title" content="İş Makinesi İlanları | Araç Parkı" />
    <meta property="og:description" content="İş makinesi ilanları — satılık, kiralık ve ikinci el." />
    <meta property="og:image" content="assets/hero/banner-1200.jpg" />
    <title>İş Makinesi İlanları | Araç Parkı</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="canonical" href="https://aracparki.com/ilanlar.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="list">
    <a class="skip-link" href="#main">İçeriğe geç</a>

    <div id="site-header"></div>

    <main class="container page-list" id="main">
      <nav class="breadcrumb" id="breadcrumb" aria-label="Sayfa yolu"></nav>

      <div class="list-layout">
        <aside class="list-aside" aria-label="Filtreler">
          <form class="aside-card filter-box" id="list-filter-form">
            <h2 class="aside-title">Filtrele</h2>
            <div class="filter-field">
              <label for="filter-tip">İlan tipi</label>
              <select id="filter-tip" name="tip">
                <option value="all">Tümü</option>
                <option value="satilik">Satılık</option>
                <option value="kiralik">Kiralık</option>
                <option value="ikinci-el">İkinci El</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="filter-category">Kategori</label>
              <select id="filter-category" name="kategori">
                <option value="">Tüm kategoriler</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="filter-city">İl</label>
              <select id="filter-city" name="il">
                <option value="">Türkiye geneli</option>
              </select>
            </div>
            <div class="filter-actions">
              <button class="btn btn-machine btn-block" type="submit">Uygula</button>
              <button class="btn btn-ghost btn-block" type="button" id="clear-filters">Temizle</button>
            </div>
          </form>
        </aside>

        <section class="list-main" aria-labelledby="list-title">
          <div class="list-toolbar">
            <h1 id="list-title">İş Makinesi İlanları <span id="result-count"></span></h1>
            <label class="sort-field">
              <span>Sırala</span>
              <select id="sort-select" aria-label="Sıralama">
                <option value="yeni">En yeni</option>
                <option value="fiyat-artan">Fiyat artan</option>
                <option value="fiyat-azalan">Fiyat azalan</option>
                <option value="saat">Saat artan</option>
              </select>
            </label>
          </div>
          <div id="list-results" class="classified-list" aria-live="polite" aria-busy="true">
            <div class="skeleton-row" aria-hidden="true"></div>
            <div class="skeleton-row" aria-hidden="true"></div>
            <div class="skeleton-row" aria-hidden="true"></div>
          </div>
        </section>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/chrome.js"></script>
    <script src="js/listings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/liste.js"></script>
  </body>
</html>
