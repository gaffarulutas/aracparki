services:
  postgres:
    image: postgres:17-alpine
    container_name: aracparki-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aracparki}
      POSTGRES_USER: ${POSTGRES_USER:-aracparki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aracparki}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aracparki_pg:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_cities.sql:/docker-entrypoint-initdb.d/02_cities.sql:ro
      - ./database/03_districts.sql:/docker-entrypoint-initdb.d/03_districts.sql:ro
      - ./database/04_neighborhoods.sql:/docker-entrypoint-initdb.d/04_neighborhoods.sql:ro
      - ./database/05_equipment_catalog.sql:/docker-entrypoint-initdb.d/05_equipment_catalog.sql:ro
      - ./database/06_demo.sql:/docker-entrypoint-initdb.d/06_demo.sql:ro
      - ./database/07_accounts.sql:/docker-entrypoint-initdb.d/07_accounts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aracparki

volumes:
  aracparki_pg:

networks:
  aracparki:
    driver: bridge
